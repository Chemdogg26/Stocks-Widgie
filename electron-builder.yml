appId: com.stockwidget.app
productName: Stock Widget
directories:
  output: dist
files:
  - main.js
  - preload.js
  - dist/**/*
  - node_modules/**/*
win:
  target: nsis
  icon: icon.ico
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
